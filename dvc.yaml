stages:

  data_ingestion:
    cmd: python src/components/data_ingestion.py
    deps:
      - src/components/data_ingestion.py
    outs: 
      - data/raw
      - data/processed

  data_transformation:
      cmd: python src/components/data_transformation.py
      deps:
        - data/processed
        - configs/data_constants_config.py 
        - src/components/data_transformation.py
      outs: 
        - data/artifacts

  experiment_splitter:
      cmd: python src/components/experiment_splittter.py
      deps: 
        - data/processed
        - data/artifacts
        - src/components/experiment_splittter.py
      outs: 
        - data/artifacts

  ml_model_trainer:
      cmd: python src/pipeline/xgboost_training.py
      deps:
        - data/artifacts
        - configs/data_constants_config.py
        - src/pipeline/xgboost_training.py
      outs: 
        - data/artifacts

  conformal_calibration_for_ml_pred_uncertainty:
      cmd:
      deps:
        - 
      outs: 
        - 
  
  gp_model_trainer:
      cmd: python src/pipeline/gp_training.py
      deps:
        - configs/data_constants_config.py
        - src/pipeline/gp_training.py
      outs: 
        - 

  model_evaluation: 
      cmd:
      deps:
        - 
      metrics: 
        - 